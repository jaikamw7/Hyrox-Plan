  { week:12, phase:4, dates:"Sep 1–6", days:[

      "Communicate with your partner between every station",
      "12 weeks of work behind you — go get it",
    ]},

];

let selectedPhase = null;
let expandedWeek = 1;

const timeline = document.getElementById('phaseTimeline');
const flexMap = {1:3, 2:4, 3:3, 4:2};
phases.forEach((p,i) => {
  const d = document.createElement('div');
  d.className = 'phase-bar';
  d.style.cssText = `flex:${flexMap[p.id]}; background:${p.color}18; border-top:2px solid ${p.color};`;
  d.innerHTML = `<div class="phase-bar-label" style="color:${p.color}">PH${p.id}</div><div class="phase-bar-weeks">Wk ${p.weeks}</div>`;
  timeline.appendChild(d);
});

const legend = document.getElementById('legend');
Object.entries(typeColors).forEach(([k,v]) => {
  const d = document.createElement('div');
  d.className = 'legend-item';
  d.innerHTML = `<div class="legend-dot" style="background:${v.border}"></div><span class="legend-label">${v.label}</span>`;
  legend.appendChild(d);
});
const credits = document.createElement('div');
credits.className = 'legend-credits';
credits.textContent = 'HYROX PREP v4 · JUN 16 → SEP 6';
legend.appendChild(credits);

function render() { renderFilters(); renderBanner(); renderWeeks(); }

function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn';
  allBtn.textContent = 'ALL WEEKS';
  allBtn.style.cssText = `background:${selectedPhase===null?'#e2e8f0':'transparent'}; color:${selectedPhase===null?'#07090f':'#94a3b8'}; border-color:${selectedPhase===null?'#e2e8f0':'#334155'};`;
  allBtn.onclick = () => { selectedPhase = null; expandedWeek = 1; render(); };
  el.appendChild(allBtn);
  phases.forEach((p,i) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = `PH${p.id}: ${p.name}`;
    const active = selectedPhase === p.id;
    btn.style.cssText = `background:${active?p.color:'transparent'}; color:${active?'#07090f':p.color}; border-color:${p.color};`;
    btn.onclick = () => { selectedPhase = p.id; expandedWeek = weeks.find(w => w.phase === p.id)?.week || 1; render(); };
    el.appendChild(btn);
  });
}

function renderBanner() {
  const el = document.getElementById('phaseBanner');
  if (!selectedPhase) { el.innerHTML = ''; return; }
  const p = phases[selectedPhase-1];
  el.innerHTML = `<div class="phase-banner" style="background:${p.bg}; border-color:${p.color}22; border-left-color:${p.color};"><span style="color:${p.color}; font-weight:800; font-size:11px; letter-spacing:2px;">PHASE ${p.id}</span><span style="font-size:12px; color:#e2e8f0;">Weeks ${p.weeks} &nbsp;·&nbsp; ${p.dates}</span><span style="color:#475569;">—</span><span style="font-size:11px; color:#94a3b8;">${p.desc}</span></div>`;
}

function renderWeeks() {
  const el = document.getElementById('weekList');
  el.innerHTML = '';
  const filtered = selectedPhase ? weeks.filter(w => w.phase === selectedPhase) : weeks;
  filtered.forEach(wk => {
    const phase = phases[wk.phase-1];
    const isOpen = expandedWeek === wk.week;
    const item = document.createElement('div');
    item.className = 'week-item';
    let badges = '';
    if (wk.week===3||wk.week===7) badges += `<span class="week-badge badge-deload">DELOAD</span>`;
    if (wk.week===10) badges += `<span class="week-badge badge-lastsim">LAST SIM</span>`;
    item.innerHTML = `
      <button class="week-header" style="background:${isOpen?'#0d1220':'#0a0d16'}; border-color:${isOpen?phase.color+'55':'#1e293b'}; border-radius:${isOpen?'6px 6px 0 0':'6px'};" onclick="toggleWeek(${wk.week})">
        <div class="week-header-left">
          <span class="week-num" style="color:${phase.color}">WEEK ${wk.week}</span>
          <span class="week-phase-tag" style="background:${phase.color}18; color:${phase.color}">PHASE ${wk.phase}</span>
          <span class="week-dates">${wk.dates}</span>
          <span class="week-sessions">${wk.days.length} sessions</span>
          ${badges}
        </div>
        <span class="week-toggle" style="color:${phase.color}">${isOpen?'−':'+'}</span>
      </button>`;
    if (isOpen) {
      const content = document.createElement('div');
      content.className = 'week-content';
      content.style.cssText = `border:1px solid ${phase.color}55; border-top:none;`;
      wk.days.forEach(day => {
        const tc = typeColors[day.type] || typeColors.recovery;
        const card = document.createElement('div');
        card.className = 'day-card';
        card.style.cssText = `background:${tc.bg}; border-color:${tc.border}35; border-top-color:${tc.border};`;
        const itemsHTML = day.items.map(item => {
          const isArrow = item.startsWith('→');
          const dot = isArrow ? '' : `<span class="item-dot" style="color:${tc.border}">·</span>`;
          return `<li class="day-item" style="color:${isArrow?'#cbd5e1':'#94a3b8'}">${dot}${item}</li>`;
        }).join('');
        card.innerHTML = `
          <div class="day-card-header">
            <div><div class="day-label">${day.label}</div><div class="day-title">${day.title}</div></div>
            <span class="day-type-tag" style="background:${tc.tag}20; color:${tc.tag}">${tc.label}</span>
          </div>
          <ul class="day-items">${itemsHTML}</ul>`;
        content.appendChild(card);
      });
      item.appendChild(content);
    }
    el.appendChild(item);
  });
}

function toggleWeek(w) { expandedWeek = (expandedWeek === w) ? null : w; render(); }
render();
</script>
